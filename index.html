<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Viki ❤️ Dishu Wedding</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1519741497674-611481863552') no-repeat center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 3em;
    letter-spacing: 3px;
}

.glow {
    color: gold;
    text-shadow: 0 0 20px gold;
}

.section {
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
}

.btn {
    display: inline-block;
    padding: 12px 25px;

    margin-top: 15px;

<body>

<div class="section">

    <div class="card">
        <h3>Haldi Ceremony</h3>
        <p>20 September 2026</p>
        <p>Taked</p>
    </div>

    <a class="btn" href="https://maps.google.com/?q=Taked">View Location</a>

<div class="section">

</html>
